<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Todo List</h1>
    <input
        id="taskTitle"
        type="text"
        placeholder="Enter task">
    <button id="addBtn">
        Add Task
    </button>
    <hr>
    <ul id="taskList">
    </ul>
<script type="module" src="js/app.js"></script>
</body>
</html>
